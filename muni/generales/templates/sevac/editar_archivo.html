{% extends "baseTemplate.html" %}
{% load crispy_forms_tags %}

{% block content %}
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/tom-select/2.3.1/css/tom-select.bootstrap5.min.css" rel="stylesheet" />

<style>
  :root {
    --brand: #3B5BDB;
    --brand-light: #EEF2FF;
    --radius-card: 16px;
    --radius-input: 10px;
    --shadow-card: 0 4px 24px rgba(59,91,219,0.08), 0 1px 4px rgba(0,0,0,0.06);
  }

  .cf-wrapper {
    max-width: 1020px;
    margin: 2rem auto;
    padding: 0 1rem;
  }

  .cf-header {
    background: linear-gradient(135deg, var(--brand) 0%, #5C7CFA 100%);
    border-radius: var(--radius-card) var(--radius-card) 0 0;
    padding: 2rem 2rem 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .cf-header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }
  .cf-header::after {
    content: '';
    position: absolute;
    bottom: -60px; left: 30px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .cf-header-icon {
    width: 48px; height: 48px;
    background: rgba(255,255,255,0.18);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    margin-bottom: 0.75rem;
    position: relative; z-index: 1;
  }
  .cf-header h2 {
    color: #fff;
    font-size: 1.3rem;
    font-weight: 600;
    margin: 0 0 0.25rem;
    position: relative; z-index: 1;
  }
  .cf-header p {
    color: rgba(255,255,255,0.75);
    font-size: 0.875rem;
    margin: 0;
    position: relative; z-index: 1;
  }

  .cf-card {
    background: #fff;
    border-radius: 0 0 var(--radius-card) var(--radius-card);
    box-shadow: var(--shadow-card);
    padding: 2rem;
    border: 1px solid #E8ECF4;
    border-top: none;
  }

  /* Crispy renderiza los inputs — los sobreescribimos globalmente */
  .cf-card .form-control,
  .cf-card select.form-control,
  .cf-card input[type="text"].form-control,
  .cf-card input[type="file"].form-control {
    border: 1.5px solid #E2E8F0;
    border-radius: var(--radius-input);
    padding: 0.6rem 0.875rem;
    font-size: 0.9375rem;
    color: #2D3748;
    background: #FAFBFF;
    transition: border-color 0.18s, box-shadow 0.18s;
  }
  .cf-card .form-control:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px rgba(59,91,219,0.12);
    outline: none;
    background: #fff;
  }
  .cf-card label {
    font-size: 0.8125rem;
    font-weight: 600;
    color: #4A5568;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 0.4rem;
  }
  .cf-card .form-group {
    margin-bottom: 1.25rem;
  }

  /* Tom Select */
  .ts-wrapper.single .ts-control {
    border: 1.5px solid #E2E8F0 !important;
    border-radius: var(--radius-input) !important;
    padding: 0.6rem 0.875rem !important;
    font-size: 0.9375rem;
    color: #2D3748;
    background: #FAFBFF !important;
    box-shadow: none !important;
    min-height: unset;
  }
  .ts-wrapper.single.focus .ts-control {
    border-color: var(--brand) !important;
    box-shadow: 0 0 0 3px rgba(59,91,219,0.12) !important;
    background: #fff !important;
  }
  .ts-dropdown {
    border: 1.5px solid #E2E8F0;
    border-radius: var(--radius-input);
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    margin-top: 4px;
  }
  .ts-dropdown .option.selected,
  .ts-dropdown .option:hover {
    background: var(--brand-light);
    color: var(--brand);
  }

  /* Hint bajo selects */
  .ts-hint {
    font-size: 0.78rem;
    color: #94A3B8;
    margin-top: 0.3rem;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .cf-divider {
    border: none;
    border-top: 1.5px dashed #EDF2F7;
    margin: 1.5rem 0;
  }

  /* Botones */
  .cf-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 1.75rem;
  }
  .btn-save {
    background: linear-gradient(135deg, var(--brand), #5C7CFA);
    color: #fff;
    border: none;
    border-radius: var(--radius-input);
    padding: 0.7rem 2rem;
    font-size: 0.9375rem;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    box-shadow: 0 4px 12px rgba(59,91,219,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-save:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(59,91,219,0.35);
  }
  .btn-save:active { transform: scale(0.98); }

  .btn-cancel {
    background: #F7FAFC;
    color: #718096;
    border: 1.5px solid #E2E8F0;
    border-radius: var(--radius-input);
    padding: 0.7rem 1.5rem;
    font-size: 0.9375rem;
    font-weight: 500;
    text-decoration: none;
    display: flex; align-items: center; gap: 6px;
    transition: background 0.15s, color 0.15s;
  }
  .btn-cancel:hover {
    background: #EDF2F7;
    color: #4A5568;
  }
</style>

<div class="cf-wrapper">
  <div class="cf-header">
    <div class="cf-header-icon">✏️</div>
    <h2>Editar Archivo</h2>
    <p>{{ archivo.nombre }}</p>
  </div>

  <div class="cf-card">
    <form method="post" enctype="multipart/form-data" id="editar-archivo-form">
      {% csrf_token %}
      {{ form|crispy }}

      <hr class="cf-divider">

      <div class="cf-actions">
        <button type="submit" class="btn-save">
          <i class="fa-solid fa-floppy-disk"></i> Guardar Cambios
        </button>
        {% if archivo.carpeta.padre %}
          <a href="{% url 'gestionar_carpetas' archivo.carpeta.padre.id %}" class="btn-cancel">
            <i class="fa-solid fa-arrow-left"></i> Cancelar
          </a>
        {% else %}
          <a href="{% url 'listar_carpetas' %}" class="btn-cancel">
            <i class="fa-solid fa-arrow-left"></i> Volver a Carpetas
          </a>
        {% endif %}
      </div>
    </form>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tom-select/2.3.1/js/tom-select.complete.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    // Aplica Tom Select a todos los <select> del formulario automáticamente
    document.querySelectorAll('#editar-archivo-form select').forEach(function (el) {
      new TomSelect(el, {
        placeholder: 'Escribe para buscar...',
        allowEmptyOption: true,
        maxOptions: null,
        plugins: ['clear_button'],
        render: {
          no_results: function (data, escape) {
            return '<div style="padding:10px;color:#94A3B8;font-size:0.875rem;">Sin resultados para "' + escape(data.input) + '"</div>';
          }
        }
      });

      // Agregar hint debajo de cada select convertido
      var hint = document.createElement('p');
      hint.className = 'ts-hint';
      hint.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> Escribe para filtrar opciones';
      el.closest('.form-group')?.appendChild(hint);
    });
  });
</script>

{% endblock %}
